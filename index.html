<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приймальня Bento</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@700&family=Inter:wght@400;700&family=Lora:ital@0;1&family=PT+Serif:ital,wght@0,400;0,700;1,700&family=Space+Grotesk:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            /* Намагаємось впихнути все в один екран */
            height: 100%;
            overflow-x: hidden;
        }

        /* ОСНОВНА КОРОБКА BENTO */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 колонки */
            gap: 10px; /* Відстань між кнопками */
            padding: 10px;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100dvh; /* Займає мінімум висоту екрану */
            align-content: stretch; /* Розтягує контент по вертикалі */
        }

        /* БАЗОВІ СТИЛІ КНОПОК */
        .btn {
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
            text-decoration: none;
            position: relative;
        }
        .btn:active { transform: scale(0.96); }

        /* 1. НАПИСАТИ ЩОСЬ СЕРЙОЗНЕ */
        .b-serious {
            grid-column: span 2; /* Займає 2 колонки */
            background: #111;
            border: 1px solid #333;
            border-radius: 24px;
            flex-direction: column;
            padding: 25px 10px;
            font-family: 'PT Serif', serif;
            text-transform: uppercase;
            font-size: 14px;
            line-height: 1.2;
        }
        .b-serious .word-serious {
            font-weight: 700;
            font-style: italic;
            font-size: 32px;
            margin-top: 5px;
        }

        /* 2. РОЗКАЗАТИ ІСТОРІЮ (як поле вводу) */
        .b-story {
            grid-column: span 2;
            background: #fff;
            color: #000;
            border: 2px solid #ccc;
            border-radius: 8px; /* Гостріші кути для інпута */
            font-family: 'Lora', serif;
            font-size: 18px;
            justify-content: flex-start;
            padding: 15px 20px;
        }
        .cursor { font-weight: bold; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* 3. НЕПОПУЛЯРНА ДУМКА */
        .b-unpopular {
            background: #b33939;
            color: #fff;
            font-family: 'Syne', sans-serif; /* Суворий бруталістичний */
            font-weight: 800;
            text-transform: uppercase;
            font-size: 16px;
            text-align: center;
            padding: 15px 10px;
            line-height: 1.1;
        }

        /* 4. НАПИСАТИ ШОПОПАЛО */
        .b-shopopalo {
            background: transparent;
            border: 2px dashed #48dbfb;
            color: #48dbfb;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; /* Крива форма */
            font-family: 'Caveat', cursive;
            font-size: 24px;
            text-align: center;
            transform: rotate(-3deg);
            line-height: 1;
        }

        /* 5. ВІДПРАВИТИ МЕМ */
        .b-meme {
            background: #d4a322; /* Гірчично-жовтий */
            color: #fff;
            font-family: Impact, sans-serif; /* Мемний шрифт */
            font-size: 22px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            text-align: center;
            line-height: 1.1;
            padding: 15px 10px;
        }

        /* 6. ВІДПРАВИТИ ФОТО */
        .b-photo {
            background: #e5e5ea;
            color: #007aff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; /* Системний */
            font-weight: 600;
            font-size: 16px;
            border-radius: 12px;
            flex-direction: column;
            gap: 5px;
        }
        .b-photo .icon { font-size: 24px; }

        /* 7. ОТАКА ПРОБЛЕМА */
        .b-problem {
            grid-column: span 2;
            background: repeating-linear-gradient(45deg, #000, #000 10px, #ffd700 10px, #ffd700 20px); /* Поліцейська стрічка */
            border: 3px solid #000;
            flex-direction: column;
            padding: 15px;
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
        }
        .b-problem .big {
            font-size: 40px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            line-height: 0.9;
        }
        .b-problem .small {
            font-size: 18px;
            background: #000;
            color: #ffd700;
            padding: 0 8px;
            margin-top: -5px;
        }

        /* 8. ПРОМОВЧАТИ */
        .b-silence {
            grid-column: span 2;
            background: transparent;
            color: #444;
            border: 1px solid #222;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            letter-spacing: 6px;
            text-transform: uppercase;
            padding: 15px;
        }

        /* 9 & 10. КАПСУЛИ: БАЗАРЧИК І ЧАТІК */
        .b-capsule {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            border-radius: 30px; /* Капсула */
            font-size: 11px;
            padding: 12px 5px;
            text-align: center;
        }
        .b-bazarchik { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
        .b-chatik { font-family: 'Comic Sans MS', cursive; font-weight: bold; }

        /* 11. НАПИСАТИ КАПСОМ (як кнопка клавіатури) */
        .b-capslock {
            background: #dcdcdc;
            color: #333;
            border-radius: 8px;
            border-bottom: 6px solid #aaa;
            border-right: 4px solid #bbb;
            border-top: 2px solid #fff;
            border-left: 2px solid #eee;
            font-family: 'Space Grotesk', sans-serif;
            flex-direction: column;
            align-items: flex-start;
            justify-content: space-between;
            padding: 10px;
        }
        .b-capslock .top { font-size: 10px; font-weight: 700; }
        .b-capslock .bottom {
            font-size: 24px;
            font-weight: 900;
            align-self: center;
            animation: glitchCaps 0.5s infinite;
        }
        @keyframes glitchCaps {
            0%, 100% { text-transform: uppercase; }
            50% { text-transform: lowercase; }
        }

        /* 12. Є ІДЕЯ */
        .b-idea {
            background: radial-gradient(circle, #fffbdb 0%, #f9e154 100%);
            color: #000;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            box-shadow: inset 0 0 10px #fff;
            border-radius: 50% 20% / 10% 40%;
            transform: rotate(2deg);
        }

        /* 13. ПОКАЗАТИ АТМОСФЕРУ (Placeholder фон через CSS патерн) */
        .b-atmosphere {
            grid-column: span 2;
            background-color: #e5e5f7;
            background-image:  repeating-linear-gradient(45deg, #c4c4c4 25%, transparent 25%, transparent 75%, #c4c4c4 75%, #c4c4c4), repeating-linear-gradient(45deg, #c4c4c4 25%, #e5e5f7 25%, #e5e5f7 75%, #c4c4c4 75%, #c4c4c4);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
            border: 1px solid #666;
            font-family: 'PT Serif', serif;
            font-style: italic;
            font-size: 16px;
            color: #000;
        }
        .b-atmosphere span {
            background: rgba(255,255,255,0.9);
            padding: 5px 15px;
            border-radius: 6px;
        }

        /* 14. ЗАПИТАТИ АДМІНІВ */
        .b-admins {
            grid-column: span 2;
            background: #1a1a1a;
            color: #555;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            border-radius: 30px;
            padding: 10px;
        }

    </style>
</head>
<body>

    <div class="bento-grid">
        
        <div class="btn b-serious">
            <div>Написати</div>
            <div>щось</div>
            <div class="word-serious">СЕРЙОЗНЕ</div>
        </div>

        <div class="btn b-story">
            Розказати історію<span class="cursor">|</span>
        </div>

        <div class="btn b-unpopular">Непопулярна<br>Думка</div>
        <div class="btn b-shopopalo">Написати<br>Шопопало</div>

        <div class="btn b-problem">
            <span class="big">ОТАКА</span>
            <span class="small">ПРОБЛЕМА</span>
        </div>

        <div class="btn b-meme">Відправити<br>мем</div>
        <div class="btn b-photo">
            <span class="icon">📷</span>
            <span>Фото</span>
        </div>

        <div class="btn b-capslock">
            <span class="top">написати</span>
            <span class="bottom">КАПСОМ</span>
        </div>
        <div class="btn b-idea">Є ідея 💡</div>

        <div class="btn b-atmosphere">
            <span>Показати атмосферу</span>
        </div>

        <div class="btn b-silence">ПРОМОВЧАТИ</div>

        <div class="btn b-capsule b-chatik">ГЛЯНУТИ ЧАТІК</div>
        <div class="btn b-capsule b-bazarchik">ГЛЯНУТИ БАЗАРЧИК</div>

        <div class="btn b-admins">Запитати адмінів (краще не треба)</div>

    </div>

</body>
</html>
