<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приймальня: Хаос</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@700&family=Inter:wght@400;700&family=Lora:ital@0;1&family=PT+Serif:ital,wght@0,400;0,700;1,700&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* КОНТРОЛЬОВАНИЙ ХАОС (БЕЗ ГРІДІВ) */
        .chaos-canvas {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; /* Великі відступи, щоб дихало */
            padding: 50px 20px 100px 20px;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .btn {
            cursor: pointer;
            text-decoration: none;
            user-select: none;
            transition: transform 0.1s;
            position: relative;
        }
        .btn:active { transform: scale(0.95); }

        /* 1. НАПИСАТИ ЩОСЬ СЕРЙОЗНЕ */
        .b-serious {
            background: #000;
            border: 2px solid #d48259;
            border-radius: 12px;
            color: #d48259;
            font-family: 'PT Serif', serif;
            text-transform: uppercase;
            padding: 30px;
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Прибито наліво */
            line-height: 1.3;
        }
        .b-serious div { font-size: 16px; }
        .b-serious .word-serious {
            font-weight: 700;
            font-style: italic;
            font-size: 32px;
            margin-top: 5px;
        }

        /* 2. РОЗКАЗАТИ ІСТОРІЮ */
        .b-story {
            background: #fff;
            color: #000;
            border-radius: 4px;
            font-family: 'Lora', serif;
            font-size: 20px;
            padding: 15px 25px;
            width: 90%;
            text-align: left;
            border: 1px solid #ccc;
            box-shadow: 0px 4px 0px #444; /* Робить її схожою на кнопку */
            transition: all 0.1s;
        }
        .b-story:active {
            box-shadow: 0px 0px 0px #444;
            transform: translateY(4px);
        }
        .cursor { font-weight: bold; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* СПЛІТ-БЛОК: ДУМКА і ШОПОПАЛО */
        .split-row {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        /* 3. НЕПОПУЛЯРНА ДУМКА */
        .b-unpopular {
            background: transparent;
            color: #b33939;
            border: 3px solid #b33939;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            padding: 15px 20px;
            font-size: 16px;
            max-width: 45%;
        }

        /* 4. НАПИСАТИ ШОПОПАЛО */
        .b-shopopalo {
            background: #050505;
            color: #48dbfb;
            border: 2px solid #48dbfb;
            border-radius: 40px;
            font-family: 'Caveat', cursive;
            font-size: 26px;
            padding: 10px 25px;
            transform: rotate(-4deg);
            max-width: 50%;
        }

        /* 5. МЕМ І ФОТО (Поруч) */
        .media-row {
            display: flex;
            gap: 20px;
            width: 90%;
            justify-content: center;
        }

        .b-meme {
            background: #e0e0e0;
            color: #000;
            font-family: Impact, sans-serif;
            font-size: 24px;
            text-transform: uppercase;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 4px 4px 0px #fff;
            flex-grow: 1;
        }

        .b-photo {
            background: #111;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            width: 120px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
        }
        .b-photo .icon { font-size: 36px; margin-bottom: 5px; } /* Типова іконка галереї */

        /* 6. ОТАКА ПРОБЛЕМА (Рваний ефект) */
        .b-problem {
            background: #d63031;
            color: #fff;
            font-family: 'Anton', sans-serif;
            padding: 30px 40px;
            text-align: center;
            line-height: 1;
            transform: rotate(2deg);
            /* Ефект відірваного паперу */
            clip-path: polygon(2% 0%, 98% 3%, 100% 95%, 95% 100%, 5% 98%, 0% 92%);
        }
        .b-problem .big { font-size: 48px; display: block; }
        .b-problem .small { font-size: 20px; letter-spacing: 2px; }

        /* 7. ПРОМОВЧАТИ (Агресивна тиша) */
        .b-silence {
            background: #000;
            color: #ff0000;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 5px;
            border: none;
            position: relative;
        }
        .b-silence::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -10%;
            width: 120%;
            height: 4px;
            background: #ff0000;
            transform: rotate(-5deg); /* Грубе закреслення */
        }

        /* 8. Є ІДЕЯ (Брутальний стікер) */
        .b-idea {
            background: #f1c40f;
            color: #000;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: 20px;
            padding: 15px 30px;
            border: 3px solid #000;
            box-shadow: 8px 8px 0px #000;
            align-self: flex-end; /* Зсуваємо вправо */
            margin-right: 20px;
            transform: rotate(-3deg);
        }

        /* 9. ПОКАЗАТИ АТМОСФЕРУ (Полароїд) */
        .b-atmosphere {
            background: #fff;
            padding: 10px 10px 30px 10px; /* Рамки полароїда */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transform: rotate(2deg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .b-atmosphere .placeholder {
            width: 200px;
            height: 200px;
            /* Типовий PNG-плейсхолдер через CSS */
            background-color: #fff;
            background-image: 
                linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%, #ccc), 
                linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%, #ccc);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            border: 1px solid #ddd;
        }
        .b-atmosphere .text {
            color: #000;
            font-family: 'Caveat', cursive;
            font-size: 22px;
            margin-top: 10px;
        }

        /* 10. КАПСЛОК */
        .b-capslock {
            background: #dcdcdc;
            color: #333;
            border-radius: 8px;
            border-bottom: 6px solid #aaa;
            border-right: 4px solid #bbb;
            border-top: 2px solid #fff;
            border-left: 2px solid #eee;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            padding: 15px 25px;
            align-self: flex-start;
            margin-left: 20px;
        }
        .b-capslock .top { font-size: 12px; font-weight: 700; }
        .b-capslock .bottom {
            font-size: 32px;
            font-weight: 900;
            animation: glitchCaps 0.5s infinite;
        }
        @keyframes glitchCaps { 0%, 100% { text-transform: uppercase; } 50% { text-transform: lowercase; } }

        /* 11. ПРОМО КАПСУЛИ (Розкидані) */
        .b-capsule {
            font-size: 10px;
            color: #888;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 8px 15px;
            position: absolute;
        }
        .b-chatik { top: 20px; right: 20px; font-family: 'Inter', sans-serif; }
        .b-bazarchik { bottom: 120px; left: 20px; font-family: 'Space Grotesk', sans-serif; font-weight: 900; }

        /* 12. АДМІНИ (Жалюгідна кнопка) */
        .b-admins {
            font-family: 'Inter', sans-serif;
            font-size: 9px;
            color: #444;
            text-transform: lowercase;
            opacity: 0.5;
            margin-top: 40px;
        }

    </style>
</head>
<body>

    <div class="chaos-canvas">
        
        <div class="btn b-capsule b-chatik">ГЛЯНУТИ ЧАТІК</div>
        <div class="btn b-capsule b-bazarchik">ГЛЯНУТИ БАЗАРЧИК</div>

        <div class="btn b-serious">
            <div>Написати</div>
            <div>щось</div>
            <div class="word-serious">СЕРЙОЗНЕ</div>
        </div>

        <div class="btn b-story">
            Розказати історію<span class="cursor">|</span>
        </div>

        <div class="split-row">
            <div class="btn b-unpopular">Непопулярна<br>Думка</div>
            <div class="btn b-shopopalo">Написати<br>Шопопало</div>
        </div>

        <div class="btn b-problem">
            <span class="big">ОТАКА</span>
            <span class="small">ПРОБЛЕМА</span>
        </div>

        <div class="media-row">
            <div class="btn b-meme">Відправити<br>мем</div>
            <div class="btn b-photo">
                <div class="icon">🖼️</div>
                ВІДПРАВИТИ<br>ФОТО
            </div>
        </div>

        <div class="btn b-idea">Є ІДЕЯ 💡</div>

        <div class="btn b-silence">ПРОМОВЧАТИ</div>

        <div class="btn b-capslock">
            <span class="top">написати</span>
            <span class="bottom">КАПСОМ</span>
        </div>

        <div class="btn b-atmosphere">
            <div class="placeholder"></div>
            <div class="text">Показати атмосферу</div>
        </div>

        <div class="btn b-admins">запитати адмінів (краще не треба)</div>

    </div>

</body>
</html>
