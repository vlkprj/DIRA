<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приймальня</title>
    <style>
        /* =========================================
           БЛОК 1: ДИЗАЙН (CSS)
           Тут ми задаємо сирий бруталістичний стиль
           ========================================= */
        body {
            background-color: #E5E0D8; /* Колір старого паперу/картону */
            color: #111;
            font-family: "Courier New", Courier, monospace; /* Друкарська машинка для атмосферності */
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Стартовий екран з пальцем */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #E5E0D8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            z-index: 999;
            transition: opacity 0.5s ease;
        }

        .finger {
            font-size: 50px;
            margin-bottom: 20px;
            animation: pointDown 1s infinite alternate;
        }

        @keyframes pointDown {
            from { transform: translateY(-10px); }
            to { transform: translateY(10px); }
        }

        /* Сітка з кнопками (поки схована) */
        #main-grid {
            display: none; /* Спочатку не показуємо */
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
            margin-top: 20px;
        }

        /* Сама кнопка — груба, жива, неідеальна */
        .bento-btn {
            background: #FFF;
            border: 3px solid #111; /* Жирний чорний контур */
            border-radius: 0px; /* Ніяких згладжувань, ми ж в авангарді */
            padding: 20px 10px;
            text-align: center;
            font-weight: bold;
            box-shadow: 6px 6px 0px #111; /* Жорстка тінь */
            opacity: 0; /* Для анімації появи */
            transform: translateY(30px);
            transition: all 0.2s ease, opacity 0.5s, transform 0.5s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100px;
            text-decoration: none;
            color: #111;
        }

        /* Ефект натискання (кнопка вдавлюється) */
        .bento-btn:active {
            transform: translate(6px, 6px) !important;
            box-shadow: 0px 0px 0px #111;
        }

        /* Клас, який JS додаватиме для появи кнопок */
        .bento-btn.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Індивідуальні приколи кнопок */
        .btn-serious { background-color: #D87A60; color: #FFF; grid-column: span 2; }
        .btn-void { background-color: #111; color: #FFF; animation: breathe 4s infinite; }
        
        @keyframes breathe {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Твій ефект рваного маркера для png-шок Валок */
        .valky-img {
            width: 100%;
            max-width: 150px;
            grid-column: span 2;
            margin: 0 auto;
            /* Цей фільтр робить білу обводку, а потім чорну, імітуючи вирізку */
            filter: drop-shadow(2px 0 0 white) drop-shadow(0 2px 0 white) drop-shadow(-2px 0 0 white) drop-shadow(0 -2px 0 white) drop-shadow(4px 4px 0 black);
            opacity: 0;
            transition: opacity 1s;
        }
        .valky-img.show { opacity: 1; }

        /* Троль-попап */
        #troll-popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-4deg);
            background: #FFE600;
            border: 4px solid #111;
            padding: 20px;
            box-shadow: 10px 10px 0px #111;
            z-index: 1000;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="finger">👇</div>
        <div>ОБЕРІТЬ ЩО ВИ ХОЧЕТЕ</div>
    </div>

    <div id="main-grid">
        
        <a href="#" class="bento-btn btn-serious">
            <span style="font-size: 24px;">📥 СКРИНЬКА</span>
            <small style="font-weight: normal; margin-top: 5px;">Написати серйозно</small>
        </a>

        <a href="#" class="bento-btn" style="border-style: dashed;">
            <span style="font-size: 24px;">🕳️ ДІРА</span>
            <small style="font-weight: normal; margin-top: 5px;">Шитпостинг і меми</small>
        </a>

        <a href="#" class="bento-btn" id="caps-button">
            нАпИсАтИ КаПсОм
        </a>

        <a href="#" class="bento-btn btn-void">
            <span>⬛ ПРОМОВЧАТИ</span>
        </a>

        </div>

    <div id="troll-popup">
        Ей, ти будеш щось тицяти чи просто дивишся? 👀<br>
        <button onclick="document.getElementById('troll-popup').style.display='none'" style="margin-top: 15px; border: 2px solid black; background: white; padding: 5px 15px; font-weight: bold; cursor: pointer;">Ой, та зараз</button>
    </div>

    <script>
        /* =========================================
           БЛОК 2: МАГІЯ (JavaScript)
           Тут ми прописуємо таймінги, попапи і логіку
           ========================================= */

        document.addEventListener("DOMContentLoaded", () => {
            const intro = document.getElementById("intro-screen");
            const grid = document.getElementById("main-grid");
            const buttons = document.querySelectorAll(".bento-btn");
            // const localImg = document.getElementById("local-img"); // розкоментуй, коли додаси картинку

            // 1. Прибираємо стартовий екран через 2.5 секунди
            setTimeout(() => {
                intro.style.opacity = "0";
                setTimeout(() => {
                    intro.style.display = "none";
                    grid.style.display = "grid"; // Показуємо сітку

                    // 2. Каскадна поява кнопок (по черзі)
                    buttons.forEach((btn, index) => {
                        setTimeout(() => {
                            btn.classList.add("show");
                        }, index * 200); // Кожна наступна з'являється на 200 мілісекунд пізніше
                    });

                    // Поява картинки
                    // setTimeout(() => { localImg.classList.add("show"); }, buttons.length * 200);

                    // 3. Запускаємо таймер на троль-попап (через 10 секунд бездіяльності)
                    let idleTimer = setTimeout(() => {
                        document.getElementById("troll-popup").style.display = "block";
                    }, 10000);

                    // Якщо юзер клікнув будь-куди на екрані, скасовуємо попап (щоб не бісив)
                    document.body.addEventListener('click', () => {
                        clearTimeout(idleTimer);
                    });

                }, 500); // Чекаємо поки інтро зникне плавно
            }, 2500);

            // 4. Шизофренія для кнопки КАПСУ
            const capsBtn = document.getElementById("caps-button");
            const capsText = "написати капсом";
            
            setInterval(() => {
                // Кожні 150 мілісекунд рандомно міняємо великі/малі літери
                let glitchedText = capsText.split('').map(char => {
                    return Math.random() > 0.5 ? char.toUpperCase() : char.toLowerCase();
                }).join('');
                capsBtn.innerText = glitchedText;
            }, 150);
        });
    </script>
</body>
</html>
