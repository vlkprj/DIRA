<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДІРА</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            color: white;
            font-family: sans-serif;
        }

        #app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('IMG_8620.png'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 40px;
        }

        #flying-message {
            position: absolute;
            bottom: 130px;
            background: rgba(0, 255, 200, 0.2);
            border: 1px solid rgba(0, 255, 200, 0.5);
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            max-width: 80%;
            text-align: center;
            backdrop-filter: blur(5px);
            opacity: 0; 
            z-index: 5;
        }

        #controls {
            display: flex;
            gap: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 16px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.1s ease;
        }

        button:active {
            transform: scale(0.92);
        }

        .btn-send { background: #00ffcc; color: black; }
        .btn-trash { background: #ff4444; color: white; }

        @keyframes suckIntoHole {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(0, -45vh) scale(0) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes throwToTrash {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(20vw, -25vh) scale(0) rotate(45deg);
                opacity: 0;
            }
        }

        .animate-hole {
            animation: suckIntoHole 1.5s ease-in-out forwards;
        }

        .animate-trash {
            animation: throwToTrash 1s ease-in forwards;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="flying-message"></div>

        <div id="controls">
            <input type="text" id="msg-input" placeholder="Напиши щось...">
            <button class="btn-send" onclick="sendToHole()">В діру</button>
            <button class="btn-trash" onclick="sendToTrash()">В урну</button>
        </div>
    </div>

    <script>
        const inputElement = document.getElementById('msg-input');
        const flyingMessage = document.getElementById('flying-message');

        function prepareMessage() {
            const text = inputElement.value;
            if (text.trim() === '') return false;

            flyingMessage.innerText = text;
            flyingMessage.style.opacity = '1';
            
            inputElement.value = '';

            flyingMessage.classList.remove('animate-hole', 'animate-trash');
            
            void flyingMessage.offsetWidth; 

            return true;
        }

        function sendToHole() {
            if (prepareMessage()) {
                flyingMessage.classList.add('animate-hole');
            }
        }

        function sendToTrash() {
            if (prepareMessage()) {
                flyingMessage.classList.add('animate-trash');
            }
        }
    </script>

</body>
</html>
